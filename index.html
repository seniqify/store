<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title/meta — overridden per-store by Home.jsx useEffect -->
    <title>Seniqify — WhatsApp Store for Indian Businesses</title>
    <meta name="description"
      content="Create your free WhatsApp store in 2 minutes. No coding. No fees. Customers browse, add to cart, and order directly on WhatsApp." />

    <!-- Open Graph (social preview) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Seniqify — WhatsApp Store for Indian Businesses" />
    <meta property="og:description" content="Create your free WhatsApp store in 2 minutes. No coding. No fees." />
    <meta property="og:image"       content="/seniqify-logo.png" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Seniqify — WhatsApp Store" />
    <meta name="twitter:description" content="Create your free WhatsApp store in 2 minutes." />

    <!-- Theme color (browser chrome + PWA) -->
    <meta name="theme-color" content="#0d9488" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
