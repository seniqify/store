<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title/meta — overridden per-store by Home.jsx useEffect -->
    <title>PocketLink — WhatsApp Page for Every Business</title>
    <meta name="description"
      content="Create your free WhatsApp business page in 2 minutes. No coding. No fees. Customers browse, add to cart, and order directly on WhatsApp." />

    <!-- Open Graph (social preview) -->
    <meta property="og:type"          content="website" />
    <meta property="og:site_name"     content="PocketLink" />
    <meta property="og:url"           content="https://www.pocketlink.store/" />
    <meta property="og:title"         content="PocketLink — Give your business a page on WhatsApp" />
    <meta property="og:description"   content="A free storefront in 2 minutes — catalog, cart & orders, all on WhatsApp. No app. No code." />
    <meta property="og:image"         content="https://www.pocketlink.store/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://www.pocketlink.store/og-image.jpg" />
    <meta property="og:image:type"    content="image/jpeg" />
    <meta property="og:image:width"   content="1200" />
    <meta property="og:image:height"  content="630" />
    <meta property="og:image:alt"     content="PocketLink — a free WhatsApp business page with catalog, cart and orders." />
    <meta property="og:locale"        content="en_IN" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="PocketLink — Give your business a page on WhatsApp" />
    <meta name="twitter:description" content="A free storefront in 2 minutes — catalog, cart & orders, all on WhatsApp. No app. No code." />
    <meta name="twitter:image"       content="https://www.pocketlink.store/og-image.jpg" />
    <meta name="twitter:image:alt"   content="PocketLink — a free WhatsApp business page with catalog, cart and orders." />

    <!-- Theme color (browser chrome + PWA) -->
    <meta name="theme-color" content="#0d9488" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="keywords" content="WhatsApp store, online catalogue, local business, order on WhatsApp, free business page, India, marketplace" />

    <!-- Structured data: Organization + WebSite (homepage; store/marketplace add their own) -->
    <script type="application/ld+json">
    {"@context":"https://schema.org","@graph":[
      {"@type":"Organization","@id":"https://www.pocketlink.store/#org","name":"PocketLink","url":"https://www.pocketlink.store/","logo":"https://www.pocketlink.store/pocketlink-logo.svg","description":"PocketLink lets any small business create a free WhatsApp storefront — catalogue, cart and orders on WhatsApp — and runs a local-business discovery marketplace."},
      {"@type":"WebSite","@id":"https://www.pocketlink.store/#website","name":"PocketLink","url":"https://www.pocketlink.store/","publisher":{"@id":"https://www.pocketlink.store/#org"},"potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://www.pocketlink.store/marketplace?q={search_term_string}"},"query-input":"required name=search_term_string"}}
    ]}
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
